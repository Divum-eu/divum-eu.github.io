name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'The branch to deploy'
        required: true
      reason:
        description: 'The reason for the manual trigger'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-${{ inputs.target_branch || github.ref }}
      
    steps:
      - name: Log Trigger Reason
        run: |
          echo "Deployment initiated by: ${{ github.actor }}"
          echo "Target Branch: ${{ inputs.target_branch || github.ref }}"
          echo "Reason: ${{ inputs.reason || 'Automatic push trigger' }}"

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ inputs.target_branch || github.ref }}
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun
        uses: AtomiCloud/actions.cache-bun@v1.0.0
        with:
          namespacelabs: false
          
      - name: Cache Eleventy .cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # 5.0.3
        with:
          path: ./.cache
          key: ${{ runner.os }}-eleventy-fetch-cache
          
      - run: bun install --frozen-lockfile
      - run: bun run build-ghpages

      - name: Upload static files as artifact
        id: deployment
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # 4.0.0
        with:
          path: _site/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # 4.0.5
